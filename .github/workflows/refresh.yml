name: Weekly Refresh

on:
  # Apps Script fires this after a successful ingestion via the GitHub API.
  repository_dispatch:
    types: [cpi_dashboard_refresh]
  # Safety-net cron: Monday 7:00 AM Central. Will skip with a clear error if
  # the staging Sheet's control tab shows ingestion hasn't run yet.
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip deploy and Slack (true/false)"
        required: false
        default: "false"
      dummy_data:
        description: "Use fixtures instead of staging Sheet (true/false)"
        required: false
        default: "false"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write          # needed to push to gh-pages branch
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          # Staging Sheet (new prod path) — Apps Script writes, Python reads.
          STAGING_SHEET_ID: ${{ secrets.STAGING_SHEET_ID }}
          GSHEETS_SA_JSON:  ${{ secrets.GSHEETS_SA_JSON }}
          # Delivery
          SLACK_CPI_WEBHOOK: ${{ secrets.SLACK_CPI_WEBHOOK }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ github.event.inputs.dummy_data }}" = "true" ]; then ARGS="$ARGS --dummy-data"; fi
          python scripts/run_pipeline.py $ARGS

      - name: Upload snapshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshots-${{ github.run_id }}
          path: store/snapshots/
          retention-days: 30
